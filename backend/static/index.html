<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Prep AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #eef4ff 0%, #f8fafc 100%);
            display: flex;
            justify-content: center;
            padding: 32px 16px;
            color: #172033;
        }
        .container {
            background: #ffffff;
            padding: 28px;
            border-radius: 18px;
            width: 100%;
            max-width: 760px;
            box-shadow: 0 18px 48px rgba(29, 41, 67, 0.12);
        }
        h1 {
            text-align: center;
            color: #172033;
            margin-bottom: 8px;
            font-size: 32px;
        }
        p.subtitle {
            text-align: center;
            color: #5a6478;
            margin-bottom: 24px;
            font-size: 15px;
        }
        .section { margin-bottom: 22px; }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #24314d;
            font-size: 14px;
        }
        input[type="file"],
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d7deea;
            border-radius: 12px;
            font-size: 14px;
            background: #ffffff;
        }
        input[type="file"] {
            border-style: dashed;
            cursor: pointer;
        }
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d7deea;
            border-radius: 12px;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
        }
        button {
            width: 100%;
            padding: 12px 14px;
            background: #315efb;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #264ee2; }
        button:disabled {
            background: #a5b1cc;
            cursor: not-allowed;
        }
        .secondary-btn {
            background: #e8eefc;
            color: #28406f;
        }
        .secondary-btn:hover {
            background: #dbe6fd;
        }
        .question-box {
            background: #f6f8ff;
            border: 1px solid #dce4fb;
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 16px;
            font-size: 15px;
            line-height: 1.6;
            color: #172033;
        }
        .panel {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 16px;
            margin-top: 14px;
        }
        .helper {
            color: #64748b;
            font-size: 13px;
            margin-top: 6px;
        }
        .option-list {
            display: grid;
            gap: 10px;
        }
        .option-card {
            border: 1px solid #d7deea;
            border-radius: 14px;
            padding: 14px;
            background: #ffffff;
        }
        .option-card input[type="radio"] {
            margin-right: 8px;
        }
        .checkbox-list {
            display: grid;
            gap: 10px;
            margin-top: 10px;
            max-height: 220px;
            overflow-y: auto;
        }
        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid #d7deea;
            border-radius: 12px;
            background: #ffffff;
        }
        .result {
            padding: 16px;
            border-radius: 14px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.7;
        }
        .correct {
            background: #dcfce7;
            border: 1px solid #86efac;
        }
        .incorrect {
            background: #fee2e2;
            border: 1px solid #fca5a5;
        }
        .meta-banner {
            background: #edf3ff;
            border: 1px solid #cfe0ff;
            color: #28406f;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 14px;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .progress-pill {
            background: #ffffff;
            border: 1px solid #cfe0ff;
            color: #28406f;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            min-width: 64px;
            text-align: center;
        }
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .hidden { display: none; }
        .status {
            text-align: center;
            color: #5a6478;
            font-size: 13px;
            margin-top: 10px;
        }
        @media (max-width: 640px) {
            .container { padding: 20px; }
            .actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Exam Prep AI</h1>
    <p class="subtitle">Upload your study material, choose what to focus on, and quiz yourself with less friction.</p>

    <div class="section" id="upload-section">
        <label for="pdf-input">Upload your PDF</label>
        <input type="file" id="pdf-input" accept=".pdf">
        <button id="upload-btn" onclick="uploadPDF()">Upload Document</button>
        <p class="status" id="upload-status"></p>
    </div>

    <div class="section hidden" id="setup-section">
        <label>Quiz setup</label>
        <div class="panel">
            <p id="document-summary">Choose what part of the document you want to be quizzed on.</p>
            <div class="option-list" style="margin-top: 14px;">
                <label class="option-card">
                    <input type="radio" name="quiz-scope" value="all" checked>
                    Entire document
                    <div class="helper">Use the full document as the quiz source.</div>
                </label>
                <label class="option-card">
                    <input type="radio" name="quiz-scope" value="pages">
                    Specific pages
                    <div class="helper">Use only the pages you enter below.</div>
                </label>
                <label class="option-card" id="chapters-option-card">
                    <input type="radio" name="quiz-scope" value="chapters">
                    Specific chapters
                    <div class="helper">Use only the chapters you select below.</div>
                </label>
            </div>

            <div class="panel hidden" id="pages-panel">
                <label for="pages-input">Page numbers or ranges</label>
                <input type="text" id="pages-input" placeholder="Example: 1-5, 8, 10-12">
                <p class="helper">Comma-separated values are supported.</p>
            </div>

            <div class="panel hidden" id="chapters-panel">
                <label>Select chapters</label>
                <div class="checkbox-list" id="chapters-list"></div>
            </div>

            <button id="start-quiz-btn" onclick="savePreferences()">Start Quiz</button>
            <p class="status" id="setup-status"></p>
        </div>
    </div>

    <div class="section hidden" id="question-section">
        <div class="meta-row">
            <div class="meta-banner" id="scope-banner"></div>
            <div class="progress-pill" id="progress-pill">0/0</div>
        </div>
        <label>Your question</label>
        <div class="question-box" id="question-text"></div>
        <p class="helper hidden" id="source-meta"></p>
        <label for="answer-input">Your answer</label>
        <textarea id="answer-input" placeholder="Type your answer here..."></textarea>
        <div class="actions">
            <button id="submit-btn" onclick="submitAnswer()">Submit Answer</button>
            <button id="skip-btn" class="secondary-btn" onclick="skipQuestion()">Skip Question</button>
        </div>
        <div class="result hidden" id="result-box"></div>
        <button class="hidden" id="next-btn" onclick="getQuestion()">Next Question</button>
    </div>
</div>

<script>
    const API = "";
    let sessionId = null;
    let currentQuestion = null;
    let currentContext = null;
    let documentMeta = { total_pages: 0, chapters: [] };
    let activePreferences = { scope: "all", page_ranges: [], chapters: [] };
    let quizCompleted = false;
    let progressState = { used_questions: 0, estimated_question_count: 0, fraction: "0/0" };

    function getSelectedScope() {
        const selected = document.querySelector('input[name="quiz-scope"]:checked');
        return selected ? selected.value : "all";
    }

    function parsePageInput(value) {
        return value
            .split(",")
            .map((part) => part.trim())
            .filter(Boolean);
    }

    function updateScopeUI() {
        const scope = getSelectedScope();
        document.getElementById("pages-panel").classList.toggle("hidden", scope !== "pages");
        document.getElementById("chapters-panel").classList.toggle("hidden", scope !== "chapters");
    }

    function renderChapterOptions(chapters) {
        const list = document.getElementById("chapters-list");
        list.innerHTML = "";

        chapters.forEach((chapter, index) => {
            const item = document.createElement("label");
            item.className = "checkbox-item";
            item.innerHTML = `
                <input type="checkbox" value="${chapter}" id="chapter-${index}">
                <span>${chapter}</span>
            `;
            list.appendChild(item);
        });
    }

    function describePreferences(preferences) {
        if (preferences.scope === "pages") {
            const ranges = preferences.page_ranges.map((range) =>
                range.start === range.end ? `page ${range.start}` : `pages ${range.start}-${range.end}`
            );
            return `Quizzing from ${ranges.join(", ")}.`;
        }

        if (preferences.scope === "chapters") {
            return `Quizzing from ${preferences.chapters.join(", ")}.`;
        }

        return "Quizzing from the entire document.";
    }

    function updateScopeBanner() {
        document.getElementById("scope-banner").textContent = describePreferences(activePreferences);
    }

    function updateProgress(progress) {
        progressState = progress || { used_questions: 0, estimated_question_count: 0, fraction: "0/0" };
        document.getElementById("progress-pill").textContent = progressState.fraction || "0/0";
    }

    function updateSourceMeta(source) {
        const sourceMeta = document.getElementById("source-meta");
        const parts = [];

        if (source && source.pages && source.pages.length) {
            parts.push(`Source pages: ${source.pages.join(", ")}`);
        }

        if (source && source.chapters && source.chapters.length) {
            parts.push(`Chapters: ${source.chapters.join(", ")}`);
        }

        if (parts.length) {
            sourceMeta.textContent = parts.join(" | ");
            sourceMeta.classList.remove("hidden");
        } else {
            sourceMeta.textContent = "";
            sourceMeta.classList.add("hidden");
        }
    }

    function setQuestionInteractionState({ canSubmit, canSkip, showNext }) {
        document.getElementById("submit-btn").disabled = !canSubmit;
        document.getElementById("skip-btn").disabled = !canSkip;
        document.getElementById("next-btn").classList.toggle("hidden", !showNext);
        document.getElementById("answer-input").disabled = !canSubmit;
    }

    function showQuizCompleted() {
        quizCompleted = true;
        currentQuestion = null;
        currentContext = null;
        document.getElementById("question-text").textContent = "Quiz completed for this selection";
        document.getElementById("answer-input").value = "";
        updateSourceMeta(null);
        updateProgress(progressState);
        setQuestionInteractionState({ canSubmit: false, canSkip: false, showNext: false });
    }

    async function readApiResponse(res) {
        const text = await res.text();
        if (!text) {
            return {};
        }

        try {
            return JSON.parse(text);
        } catch {
            return { detail: text };
        }
    }

    async function uploadPDF() {
        const file = document.getElementById("pdf-input").files[0];
        if (!file) {
            alert("Please select a PDF file");
            return;
        }

        const status = document.getElementById("upload-status");
        const btn = document.getElementById("upload-btn");
        btn.disabled = true;
        status.textContent = "Uploading and processing...";

        const formData = new FormData();
        formData.append("file", file);

        try {
            const res = await fetch(`${API}/upload`, { method: "POST", body: formData });
            const data = await readApiResponse(res);

            if (!res.ok) {
                throw new Error(data.detail || "Upload failed");
            }

            sessionId = data.session_id;
            documentMeta = {
                total_pages: data.total_pages || 0,
                chapters: data.chapters || [],
            };

            status.textContent = "Upload successful.";
            document.getElementById("upload-section").classList.add("hidden");
            document.getElementById("setup-section").classList.remove("hidden");
            document.getElementById("document-summary").textContent =
                `This document has ${documentMeta.total_pages} page(s)` +
                (documentMeta.chapters.length ? ` and ${documentMeta.chapters.length} detected chapter(s).` : ".");

            renderChapterOptions(documentMeta.chapters);

            const hasChapters = documentMeta.chapters.length > 0;
            document.getElementById("chapters-option-card").classList.toggle("hidden", !hasChapters);

            if (!hasChapters && getSelectedScope() === "chapters") {
                document.querySelector('input[name="quiz-scope"][value="all"]').checked = true;
            }

            updateScopeUI();
        } catch (err) {
            status.textContent = err.message || "Upload failed. Try again.";
            btn.disabled = false;
        }
    }

    async function savePreferences() {
        const scope = getSelectedScope();
        const setupStatus = document.getElementById("setup-status");
        const button = document.getElementById("start-quiz-btn");

        const payload = { scope, page_ranges: [], chapters: [] };

        if (scope === "pages") {
            payload.page_ranges = parsePageInput(document.getElementById("pages-input").value);
            if (!payload.page_ranges.length) {
                setupStatus.textContent = "Enter at least one page or page range.";
                return;
            }
        }

        if (scope === "chapters") {
            payload.chapters = Array.from(document.querySelectorAll('#chapters-list input[type="checkbox"]:checked'))
                .map((checkbox) => checkbox.value);
            if (!payload.chapters.length) {
                setupStatus.textContent = "Select at least one chapter.";
                return;
            }
        }

        button.disabled = true;
        setupStatus.textContent = "Saving quiz preferences...";

        try {
            const res = await fetch(`${API}/preferences/${sessionId}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            const data = await readApiResponse(res);

            if (!res.ok) {
                throw new Error(data.detail || "Could not save preferences");
            }

            activePreferences = data.preferences;
            quizCompleted = false;
            updateScopeBanner();
            updateProgress(data.preferences);

            document.getElementById("setup-section").classList.add("hidden");
            document.getElementById("question-section").classList.remove("hidden");
            setupStatus.textContent = "";
            getQuestion();
        } catch (err) {
            setupStatus.textContent = err.message || "Could not save preferences.";
        } finally {
            button.disabled = false;
        }
    }

    async function loadQuestion(endpoint) {
        const questionText = document.getElementById("question-text");
        const resultBox = document.getElementById("result-box");
        const answerInput = document.getElementById("answer-input");

        quizCompleted = false;
        questionText.textContent = "Generating question...";
        resultBox.classList.add("hidden");
        answerInput.value = "";
        updateSourceMeta(null);
        setQuestionInteractionState({ canSubmit: false, canSkip: false, showNext: false });

        try {
            const res = await fetch(endpoint, { method: endpoint.endsWith("/skip") ? "POST" : "GET" });
            const data = await readApiResponse(res);

            if (!res.ok) {
                if (res.status === 409) {
                    showQuizCompleted();
                    return;
                }
                throw new Error(data.detail || "Failed to load question");
            }

            currentQuestion = data.question;
            currentContext = data.context;
            questionText.textContent = currentQuestion;
            updateSourceMeta(data.source);
            updateProgress(data.progress);
            setQuestionInteractionState({ canSubmit: true, canSkip: true, showNext: false });
        } catch (err) {
            questionText.textContent = err.message || "Failed to load question. Try again.";
            setQuestionInteractionState({ canSubmit: false, canSkip: false, showNext: false });
        }
    }

    async function getQuestion() {
        await loadQuestion(`${API}/question/${sessionId}`);
    }

    async function skipQuestion() {
        if (quizCompleted) {
            return;
        }
        await loadQuestion(`${API}/question/${sessionId}/skip`);
    }

    async function submitAnswer() {
        if (quizCompleted || !currentQuestion) {
            return;
        }

        const studentAnswer = document.getElementById("answer-input").value.trim();
        if (!studentAnswer) {
            alert("Please type an answer first");
            return;
        }

        const resultBox = document.getElementById("result-box");
        const btn = document.getElementById("submit-btn");
        btn.disabled = true;
        document.getElementById("skip-btn").disabled = true;
        resultBox.classList.add("hidden");

        try {
            const res = await fetch(`${API}/answer`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    session_id: sessionId,
                    question: currentQuestion,
                    context: currentContext,
                    student_answer: studentAnswer
                })
            });
            const data = await readApiResponse(res);

            if (!res.ok) {
                throw new Error(data.detail || "Failed to evaluate answer");
            }

            resultBox.className = `result ${data.is_correct ? "correct" : "incorrect"}`;
            resultBox.innerHTML = `
                <strong>${data.is_correct ? "Correct" : "Incorrect"}</strong><br>
                ${data.feedback}
                ${!data.is_correct && data.correct_answer !== "N/A" ? `<br><br><strong>Suggested answer:</strong> ${data.correct_answer}` : ""}
            `;
            resultBox.classList.remove("hidden");
            setQuestionInteractionState({ canSubmit: false, canSkip: false, showNext: true });
        } catch (err) {
            resultBox.className = "result incorrect";
            resultBox.textContent = err.message || "Failed to evaluate answer. Try again.";
            resultBox.classList.remove("hidden");
            setQuestionInteractionState({ canSubmit: true, canSkip: true, showNext: false });
        } finally {
            if (!document.getElementById("next-btn").classList.contains("hidden")) {
                btn.disabled = true;
            }
        }
    }

    document.querySelectorAll('input[name="quiz-scope"]').forEach((radio) => {
        radio.addEventListener("change", updateScopeUI);
    });

    updateScopeUI();
    setQuestionInteractionState({ canSubmit: false, canSkip: false, showNext: false });
</script>
</body>
</html>
