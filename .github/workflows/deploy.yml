name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Compile backend source
        run: python -m py_compile backend/main.py backend/routes/upload.py backend/routes/question.py backend/routes/answer.py backend/services/embedder.py backend/services/pdf_parser.py backend/services/question_gen.py backend/services/evaluator.py
